{% extends 'base.html' %}

{% block content %}

<style>
.profile-container {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 25px;
}

/* LEFT CARD */
.profile-card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.avatar {
    width: 80px;
    height: 80px;
    background: #2563eb;
    color: white;
    font-size: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    margin: auto;
    margin-bottom: 15px;
}

.profile-card h3 {
    margin: 10px 0 5px;
}

.profile-card p {
    color: #64748b;
    margin: 4px 0;
}

/* RIGHT FORM */
.form-card {
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.form-card h2 {
    margin-bottom: 20px;
}

label {
    font-weight: 500;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    transition: 0.2s;
}

input:focus, select:focus, textarea:focus {
    border-color: #2563eb;
    outline: none;
}

textarea {
    resize: none;
    height: 100px;
}

button {
    background: #2563eb;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    background: #1e40af;
}

/* RESPONSIVE */
@media(max-width: 768px){
    .profile-container {
        grid-template-columns: 1fr;
    }
}
</style>

<div class="profile-container">

    <!-- LEFT PROFILE CARD -->
    <div class="profile-card">
        <div class="avatar">
            {{ request.user.username|first|upper }}
        </div>

        <h3>Dr. {{ request.user.username }}</h3>

        <p>
            {{ doctor.specialty|default:"No specialty yet" }}
        </p>

        <p>
            {{ doctor.department|default:"No department yet" }}
        </p>
    </div>

    <!-- RIGHT FORM -->
    <div class="form-card">
        <h2>Edit Profile ✏️</h2>

        <form method="POST">
            {% csrf_token %}

            <!-- SPECIALTY -->
            <label>Specialty</label>
            <select name="specialty" required>
                <option value="">-- Select Specialty --</option>

                {% for sp in specialties %}
                    <option value="{{ sp }}" 
                        {% if doctor.specialty == sp %}selected{% endif %}>
                        {{ sp }}
                    </option>
                {% endfor %}
            </select>

            <!-- DEPARTMENT -->
            <label>Department</label>
            <select name="department" required>
                <option value="">-- Select Department --</option>

                {% for dept in departments %}
                    <option value="{{ dept }}" 
                        {% if doctor.department == dept %}selected{% endif %}>
                        {{ dept }}
                    </option>
                {% endfor %}
            </select>

            <!-- BIO -->
            <label>Bio</label>
            <textarea name="bio">{{ doctor.bio }}</textarea>

            <button type="submit">💾 Save Changes</button>
        </form>
    </div>

</div>

{% endblock %}
