<!DOCTYPE html>
<html lang="en">
<head>
    <title>Patient Booking System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(120deg, #eef2ff, #f8fafc);
        }

        .navbar {
            background: #0f172a;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        
        }

        .navbar h2 {
            color: white;
            margin: 0;
        }

        .nav-links a {
            color: #cbd5f5;
            margin-left: 40px;
            margin-right: px;
            text-decoration: none;
            font-weight: 500;
            position: relative;
        }
        .nav-links{
            margin-left: 900px;
            margin-top: 40px;
        }

        .nav-links a:hover {
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        h2 {
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: 0.2s;
        }

        input:focus {
            border-color: #2563eb;
            outline: none;
        }

        button {
            background: #2563eb;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #1e40af;
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-danger:hover {
            background: #991b1b;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
        }

        .pending { background: #fef3c7; }
        .confirmed { background: #dbeafe; }
        .completed { background: #dcfce7; }
        .cancelled { background: #fee2e2; }
    </style>
</head>

<body>

<div class="navbar">
    <h2>🏥 EMCBook</h2>

     
</div>

<div class="container">

    {% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}

</div>

</body>
</html>
